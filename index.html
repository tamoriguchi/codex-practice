<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>返信テンプレBox MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">小規模店舗向け</p>
        <h1>返信テンプレBox</h1>
        <p class="lead">LINEやDMでよく使う返信文を保存して、検索して、ワンクリックでコピーできます。</p>
      </div>
      <div class="hero-card">
        <span class="metric">月額想定</span>
        <strong>¥680〜</strong>
        <small>Freeは5件まで</small>
      </div>
    </header>

    <main class="app-shell">
      <section class="panel form-panel" aria-labelledby="form-title">
        <h2 id="form-title">テンプレートを追加</h2>
        <form id="template-form">
          <label>
            タイトル
            <input id="title" name="title" type="text" placeholder="例: 予約候補日の案内" required />
          </label>
          <label>
            カテゴリ
            <input id="category" name="category" type="text" placeholder="例: 予約" required />
          </label>
          <label>
            本文
            <textarea id="body" name="body" rows="8" placeholder="例: ご連絡ありがとうございます。以下の日程でご予約可能です。" required></textarea>
          </label>
          <button type="submit">保存する</button>
        </form>
      </section>

      <section class="panel list-panel" aria-labelledby="list-title">
        <div class="list-header">
          <div>
            <h2 id="list-title">テンプレート一覧</h2>
            <p id="template-count">0件</p>
          </div>
          <button id="reset-samples" class="ghost-button" type="button">サンプルに戻す</button>
        </div>

        <div class="filters">
          <input id="search" type="search" placeholder="キーワードで検索" />
          <select id="category-filter" aria-label="カテゴリで絞り込み">
            <option value="all">すべてのカテゴリ</option>
          </select>
        </div>

        <div id="template-list" class="template-list"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
