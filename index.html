<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>個人資産収支帳</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="アプリナビゲーション">
        <div class="brand">
          <div class="brand-mark">帳簿</div>
          <div>
            <p class="eyebrow">Personal Ledger</p>
            <h1>個人資産収支帳</h1>
          </div>
        </div>
        <nav class="nav-list" aria-label="主要画面">
          <a href="#dashboard" class="active">ダッシュボード</a>
          <a href="#budgets">貯金箱予算</a>
          <a href="#transactions">収支記録</a>
          <a href="#assets">現物資産</a>
          <a href="#analysis">支出分析</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="テーマ切り替え">◐</button>
      </aside>

      <main>
        <section class="topbar">
          <div>
            <p class="eyebrow">個人の資産・収支を一元管理</p>
            <h2>お金の流れと、手元に残る価値を見る</h2>
          </div>
          <div class="month-chip" id="monthLabel"></div>
        </section>

        <section id="dashboard" class="section">
          <div class="summary-grid">
            <article class="metric positive">
              <span>今月の収入</span>
              <strong id="incomeTotal">0円</strong>
            </article>
            <article class="metric negative">
              <span>今月の支出</span>
              <strong id="expenseTotal">0円</strong>
            </article>
            <article class="metric">
              <span>月次差額</span>
              <strong id="cashFlow">0円</strong>
            </article>
            <article class="metric accent">
              <span>純資産</span>
              <strong id="netWorth">0円</strong>
            </article>
          </div>

          <div class="dashboard-grid">
            <article class="panel">
              <div class="panel-heading">
                <h3>総資産</h3>
                <span id="assetizedRate">資産化率 0%</span>
              </div>
              <div class="asset-stack" aria-label="総資産の内訳">
                <div><span>現金・預金</span><strong id="cashAssets">0円</strong></div>
                <div><span>投資・暗号資産</span><strong id="investmentAssets">0円</strong></div>
                <div><span>現物資産</span><strong id="physicalAssets">0円</strong></div>
                <div><span>負債</span><strong id="liabilities">0円</strong></div>
              </div>
            </article>

            <article class="panel">
              <div class="panel-heading">
                <h3>現物資産の残存価値</h3>
                <span id="monthlyDepreciation">今月の償却 0円</span>
              </div>
              <div class="asset-value-panel" id="assetValuePanel"></div>
            </article>
          </div>
        </section>

        <section id="budgets" class="section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Budget Piggy Banks</p>
              <h2>カテゴリ別予算</h2>
            </div>
            <button class="ghost-button" id="resetDemo" type="button">デモ初期化</button>
          </div>
          <div class="budget-grid" id="budgetGrid"></div>
        </section>

        <section id="transactions" class="section two-column">
          <form class="panel form-panel" id="transactionForm">
            <div class="panel-heading">
              <h3 id="transactionFormTitle">収支を追加</h3>
              <span id="transactionFormHint">満足度も記録</span>
            </div>
            <div class="segmented" role="group" aria-label="取引種別">
              <label><input type="radio" name="type" value="expense" checked>支出</label>
              <label><input type="radio" name="type" value="income">収入</label>
            </div>
            <label>金額<input name="amount" type="number" min="1" required placeholder="1200"></label>
            <label>日付<input name="createdAt" type="date" required></label>
            <label>カテゴリ<select name="categoryId" id="transactionCategory"></select></label>
            <label>支払い口座<select name="accountId" id="transactionAccount"></select></label>
            <label>タグ<input name="tags" type="text" placeholder="カフェ, 自己投資"></label>
            <div class="rating-row">
              <label>満足度<input name="satisfaction" type="range" min="1" max="5" value="4"></label>
              <label>後悔度<input name="regret" type="range" min="1" max="5" value="1"></label>
            </div>
            <label>メモ<textarea name="memo" rows="3" placeholder="なぜこの支出をしたか"></textarea></label>
            <div class="form-actions">
              <button class="primary-button" id="transactionSubmit" type="submit">記録する</button>
              <button class="ghost-button hidden" id="cancelTransactionEdit" type="button">編集をやめる</button>
            </div>
          </form>

          <article class="panel">
            <div class="panel-heading">
              <h3>最近の収支</h3>
              <span id="transactionCount">0件</span>
            </div>
            <div class="list" id="transactionList"></div>
          </article>
        </section>

        <section id="assets" class="section two-column">
          <form class="panel form-panel" id="assetForm">
            <div class="panel-heading">
              <h3 id="assetFormTitle">資産を登録</h3>
              <span id="assetFormHint">現在価値を自動計算</span>
            </div>
            <label>名前<input name="name" required placeholder="MacBook Pro"></label>
            <label>カテゴリ<input name="category" required placeholder="PC"></label>
            <label>購入価格<input name="purchasePrice" type="number" min="1" required placeholder="300000"></label>
            <label>購入日<input name="purchasedAt" type="date" required></label>
            <label>耐用年数（月）<input name="usefulLifeMonths" type="number" min="1" required value="60"></label>
            <label>状態<select name="condition"><option>良好</option><option>普通</option><option>要修理</option></select></label>
            <div class="form-actions">
              <button class="primary-button" id="assetSubmit" type="submit">資産化する</button>
              <button class="ghost-button hidden" id="cancelAssetEdit" type="button">編集をやめる</button>
            </div>
          </form>

          <article class="panel">
            <div class="panel-heading">
              <h3>現物資産</h3>
              <span id="assetCount">0件</span>
            </div>
            <div class="list asset-list" id="assetList"></div>
          </article>
        </section>

        <section id="analysis" class="section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Spending Signals</p>
              <h2>支出分析</h2>
            </div>
          </div>
          <div class="analysis-grid" id="analysisGrid"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
